<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="apple-touch-icon" href="images/favicon.png">
<title>べんきょうクエスト</title>
<style>
:root {
  --dq-bg: #000;
  --dq-panel: #000;
  --dq-border: #fff;
  --dq-text: #fff;
  --dq-yellow: #ffe14c;
  --dq-red: #ff6b6b;
  --dq-green: #6bef7f;
  --dq-blue: #6bd3ff;
  --dq-dim: #888;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--dq-bg);
  color: var(--dq-text);
  font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "ヒラギノ角ゴシック", "Hiragino Sans", sans-serif;
  font-size: 17px;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
}

body {
  min-height: 100vh;
  padding: 12px;
  padding-bottom: 80px;
  user-select: none;
  -webkit-user-select: none;
}

h1 {
  text-align: center;
  font-size: 22px;
  margin: 8px 0 16px;
  letter-spacing: 0.1em;
  color: var(--dq-yellow);
}

/* DQ風メッセージ枠 */
.panel {
  border: 3px solid var(--dq-border);
  border-radius: 10px;
  padding: 12px 14px;
  margin: 10px 0;
  background: var(--dq-panel);
  box-shadow: 0 0 0 2px #000 inset;
}

.panel .panel-title {
  font-size: 14px;
  color: var(--dq-yellow);
  margin-bottom: 6px;
  letter-spacing: 0.1em;
}

.row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.row + .row { margin-top: 4px; }

button {
  font-family: inherit;
  font-size: 17px;
  color: var(--dq-text);
  background: #000;
  border: 2px solid var(--dq-border);
  border-radius: 8px;
  padding: 10px 14px;
  min-height: 44px;
  cursor: pointer;
  touch-action: manipulation;
}
button:active { background: #fff; color: #000; }
button:disabled { opacity: 0.35; cursor: not-allowed; }
button:disabled:active { background: #000; color: var(--dq-text); }

.btn-yellow { color: var(--dq-yellow); border-color: var(--dq-yellow); }
.btn-red { color: var(--dq-red); border-color: var(--dq-red); }
.btn-green { color: var(--dq-green); border-color: var(--dq-green); }

/* キャラクター情報 */
.hero-bar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  font-size: 16px;
}
.hero-bar .label { color: var(--dq-dim); font-size: 13px; }
.hero-bar .value { font-size: 18px; color: var(--dq-yellow); }

/* 教科パネル */
#subjects {
  margin: 10px 0;
}
.review-wrap {
  margin-bottom: 10px;
}
.subjects-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (max-width: 380px) {
  .subjects-grid { grid-template-columns: 1fr; }
}
.subject {
  border: 3px solid var(--dq-border);
  border-radius: 10px;
  padding: 10px 12px;
  background: #000;
}
/* やり直し専用 — 特別な金色枠＆光彩 */
.subject.review {
  border: 4px solid var(--dq-yellow);
  background: linear-gradient(135deg, #1a1500 0%, #000 60%, #1a1500 100%);
  box-shadow: 0 0 0 2px #000 inset, 0 0 18px #ffe14c55;
  position: relative;
}
.subject.review .subject-name { color: var(--dq-yellow); font-size: 22px; }
.subject.review .subject-level { color: var(--dq-yellow); }
.subject.review .weapon { color: var(--dq-yellow); }
.review-banner {
  text-align: center;
  font-size: 13px;
  color: var(--dq-yellow);
  margin-bottom: 6px;
  letter-spacing: 0.08em;
  text-shadow: 0 0 6px #ffe14c66;
  animation: reviewSparkle 2.4s ease-in-out infinite;
}
@keyframes reviewSparkle {
  0%, 100% { opacity: 0.85; }
  50%      { opacity: 1; text-shadow: 0 0 10px #ffe14c, 0 0 18px #ffe14c66; }
}
.subject.studying { border-color: var(--dq-yellow); box-shadow: 0 0 0 2px #ffe14c44 inset; }

.subject-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.subject-name { font-size: 19px; font-weight: bold; }
.subject-level { font-size: 14px; color: var(--dq-yellow); }

.expbar {
  height: 14px;
  border: 2px solid #fff;
  border-radius: 4px;
  background: #000;
  position: relative;
  margin: 4px 0 6px;
  overflow: hidden;
}
.expbar > .fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background: var(--dq-yellow);
}
.expbar > .text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  color: #fff;
  text-shadow: 0 0 2px #000, 0 0 2px #000;
  mix-blend-mode: normal;
}

.weapon { font-size: 14px; color: var(--dq-blue); margin-bottom: 8px; }

.subject-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.subject-actions button { flex: 1 1 auto; min-width: 90px; }
.subject-actions button.subj-bgm-btn {
  flex: 0 0 auto;
  min-width: 0;
  width: 48px;
  padding: 8px 0;
  font-size: 18px;
  line-height: 1;
}

.timer-display {
  font-size: 28px;
  text-align: center;
  letter-spacing: 0.1em;
  font-feature-settings: "tnum";
  color: var(--dq-yellow);
  margin: 6px 0;
}

/* ボスセクション */
.boss-list .boss-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px dashed #444;
}
.boss-list .boss-item:last-child { border-bottom: none; }
.boss-name { font-size: 16px; }
.boss-info { font-size: 12px; color: var(--dq-dim); }
.boss-defeated { color: var(--dq-dim); text-decoration: line-through; }

/* モーダル */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  padding: 12px;
}
.modal {
  border: 3px solid var(--dq-border);
  border-radius: 10px;
  background: #000;
  padding: 16px;
  max-width: 560px;
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
}

/* バトル */
.battle-stats { display: flex; justify-content: space-around; margin: 12px 0; }
.battle-stats .who { text-align: center; }
.battle-stats .name { font-size: 14px; color: var(--dq-yellow); }
.battle-stats .hp { font-size: 22px; }
.hp-heart { color: var(--dq-red); }
.hp-empty { color: #444; }

.battle-message {
  border: 2px solid var(--dq-border);
  border-radius: 6px;
  padding: 10px;
  margin: 10px 0;
  min-height: 70px;
  font-size: 16px;
  white-space: pre-wrap;
}

.quiz-question {
  font-size: 18px;
  margin: 12px 0;
  white-space: pre-wrap;
}
.quiz-choices { display: flex; flex-direction: column; gap: 8px; }
.quiz-choices button { text-align: left; padding: 12px 14px; font-size: 17px; }

.flash-correct { animation: flashGreen 0.5s; }
.flash-wrong { animation: flashRed 0.5s; }
@keyframes flashGreen { 0%,100%{background:#000;} 50%{background:#0a4;} }
@keyframes flashRed   { 0%,100%{background:#000;} 50%{background:#a00;} }

/* メニュー */
.menu-section { font-size: 14px; }
.menu-section .item { display: flex; justify-content: space-between; padding: 4px 0; }
.menu-section .label { color: var(--dq-dim); }

.confirm-btns { display: flex; gap: 10px; margin-top: 12px; }
.confirm-btns button { flex: 1; }

/* トースト */
#toast-root {
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 200;
  align-items: center;
  pointer-events: none;
}
.toast {
  background: #000;
  border: 2px solid var(--dq-yellow);
  color: var(--dq-yellow);
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 16px;
  animation: toastIn 0.3s ease-out;
  max-width: 90vw;
  text-align: center;
  white-space: pre-wrap;
  pointer-events: auto;
}
.toast.toast-trophy { border-color: var(--dq-green); color: var(--dq-green); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ふりかえり */
.review-stat-row {
  display: flex;
  gap: 8px;
  padding: 5px 6px;
  align-items: center;
  font-size: 14px;
}
.review-stat-row .label { flex: 1; }
.review-stat-row .value { font-feature-settings: "tnum"; }
.review-total {
  border-top: 2px solid var(--dq-yellow);
  margin-top: 6px;
  padding-top: 6px;
  color: var(--dq-yellow);
  font-weight: bold;
}
.month-row {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 3px 0;
  font-size: 12px;
}
.month-row.month-current .month-label,
.month-row.month-current .month-value { color: var(--dq-yellow); font-weight: bold; }
.month-row .month-label { width: 60px; flex-shrink: 0; }
.month-row .month-bar {
  flex: 1; height: 12px;
  border: 1px solid #555;
  border-radius: 3px;
  background: #000;
  position: relative;
  overflow: hidden;
}
.month-row .month-bar .fill {
  position: absolute; top:0; left:0; bottom:0;
  background: var(--dq-yellow);
}
.month-row .month-value {
  width: 90px; text-align: right;
  color: var(--dq-dim);
  flex-shrink: 0;
}

/* 進捗バー (今週・今月) */
.progress-mini {
  font-size: 12px;
  color: var(--dq-dim);
  margin-top: 2px;
}
.progress-mini .next {
  color: var(--dq-yellow);
}

/* 戦闘シーン (タイマー中) */
.battle-scene {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 12px 4px;
  margin: 8px 0;
  min-height: 250px;
  border: 2px solid #333;
  border-radius: 8px;
  background: #000;
  overflow: hidden;
}
.battle-hero {
  width: 200px;
  height: 236px;
  object-fit: contain;
  object-position: center;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  animation: heroBob 1.1s ease-in-out infinite;
  transform-origin: center bottom;
  will-change: transform, filter;
}
.battle-hero.no-image {
  width: auto;
  height: auto;
  font-size: 80px;
}
.battle-enemy {
  font-size: 96px;
  line-height: 1;
  animation: enemyBob 1.3s ease-in-out infinite;
  animation-delay: 0.4s;
  transform-origin: center bottom;
  will-change: transform, filter;
  display: inline-block;
}
img.battle-enemy {
  width: 200px;
  height: 236px;
  object-fit: contain;
  object-position: center;
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  font-size: 0;
}
.battle-enemy.no-image {
  width: auto;
  height: auto;
  font-size: 96px;
}
/* 攻撃 — 構え→踏み込み→振り抜き→戻り */
.battle-hero.attacking {
  animation: heroLunge 0.85s cubic-bezier(.22,.85,.4,1.2);
}
.battle-enemy.hit {
  animation: enemyHit 0.85s ease-out;
}
/* 牽制 (アイドル中の小さな動き) */
.battle-hero.feint {
  animation: heroFeint 0.55s ease-out;
}
.battle-enemy.approach {
  animation: enemyApproach 0.7s ease-in-out;
}
@keyframes heroBob {
  0%, 100% { transform: translate(0, 0) rotate(0); }
  25%      { transform: translate(2px, -3px) rotate(1deg); }
  50%      { transform: translate(-1px, -7px) rotate(-0.5deg); }
  75%      { transform: translate(-2px, -3px) rotate(-1deg); }
}
@keyframes enemyBob {
  0%, 100% { transform: translate(0, 0) scale(1); }
  30%      { transform: translate(2px, -5px) scale(1.02); }
  60%      { transform: translate(-3px, -8px) scale(1.04); }
}
@keyframes heroLunge {
  0%   { transform: translate(0, 0) scale(1) rotate(0); filter: none; }
  15%  { transform: translate(20px, -4px) scale(1.02) rotate(3deg); }    /* 構え（後ろに引く） */
  40%  { transform: translate(-75px, -18px) scale(1.18) rotate(-4deg);
         filter: drop-shadow(0 0 12px #fff8) brightness(1.15); }           /* 踏み込み（左方向） */
  55%  { transform: translate(-75px, -18px) scale(1.18) rotate(-4deg);
         filter: drop-shadow(0 0 12px #fff8) brightness(1.15); }
  100% { transform: translate(0, 0) scale(1) rotate(0); filter: none; }
}
@keyframes enemyHit {
  0%   { transform: translate(0, 0) scale(1) rotate(0); filter: none; }
  10%  { transform: translate(30px, -12px) scale(0.85) rotate(18deg);
         filter: brightness(2.5) hue-rotate(-30deg); }
  25%  { transform: translate(-28px, 10px) scale(1.18) rotate(-14deg);
         filter: brightness(2.5) hue-rotate(-30deg); }
  40%  { transform: translate(22px, -6px) rotate(10deg);
         filter: brightness(1.8); }
  55%  { transform: translate(-16px, 4px) rotate(-7deg);
         filter: brightness(1.8); }
  70%  { transform: translate(8px, 0) rotate(3deg); filter: brightness(1.2); }
  85%  { transform: translate(-4px, 0) rotate(-1deg); }
  100% { transform: translate(0, 0) rotate(0); filter: none; }
}
@keyframes heroFeint {
  0%, 100% { transform: translate(0, 0) rotate(0); }
  35%      { transform: translate(-18px, -6px) rotate(3deg); }
  65%      { transform: translate(-18px, -6px) rotate(3deg); }
}
@keyframes enemyApproach {
  0%, 100% { transform: translate(0, 0) scale(1); }
  40%      { transform: translate(22px, -8px) scale(1.1); }
  60%      { transform: translate(22px, -8px) scale(1.1); }
}
/* 剣の閃光 */
.slash-fx {
  position: absolute;
  top: 45%;
  left: 12%;
  width: 160px;
  height: 8px;
  background: linear-gradient(90deg, transparent 0%, #ffe14c 40%, #fff 60%, transparent 100%);
  transform-origin: left center;
  pointer-events: none;
  filter: drop-shadow(0 0 8px #ffe14c) blur(0.5px);
  animation: slashGo 0.5s ease-out forwards;
}
@keyframes slashGo {
  0%   { transform: translateY(-50%) rotate(30deg) scaleX(0); opacity: 0; }
  20%  { transform: translateY(-50%) rotate(30deg) scaleX(1); opacity: 1; }
  60%  { transform: translateY(-50%) rotate(30deg) scaleX(1); opacity: 1; }
  100% { transform: translateY(-50%) rotate(30deg) scaleX(1); opacity: 0; }
}
/* 衝撃マーク */
.spark-fx {
  position: absolute;
  pointer-events: none;
  font-size: 30px;
  color: #ffe14c;
  text-shadow: 0 0 8px #fff, 0 0 4px #ffe14c;
  animation: sparkGo 0.6s ease-out forwards;
}
@keyframes sparkGo {
  0%   { opacity: 0; transform: translate(0,0) scale(0.4); }
  30%  { opacity: 1; transform: translate(0,0) scale(1.3); }
  100% { opacity: 0; transform: translate(var(--dx,0), var(--dy,-20px)) scale(0.7); }
}
.damage-text {
  position: absolute;
  top: 22%;
  left: 14%;
  color: var(--dq-red);
  font-weight: bold;
  font-size: 38px;
  pointer-events: none;
  animation: damageFloat 1.2s cubic-bezier(.2,1.4,.4,1) forwards;
  text-shadow: 2px 2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000;
  font-feature-settings: "tnum";
  letter-spacing: 0.05em;
}
@keyframes damageFloat {
  0%   { opacity: 0; transform: translate(0, 20px) scale(0.3) rotate(-10deg); }
  18%  { opacity: 1; transform: translate(0, -10px) scale(1.4) rotate(5deg); }
  32%  { opacity: 1; transform: translate(0, -8px) scale(1.0) rotate(-2deg); }
  60%  { opacity: 1; transform: translate(0, -20px) scale(1.0) rotate(0); }
  100% { opacity: 0; transform: translate(0, -70px) scale(1.0); }
}

/* やり直し専用 — 勇者左、敵右 のミラー版 */
.battle-scene.battle-review .battle-hero.attacking {
  animation: heroLungeR 0.85s cubic-bezier(.22,.85,.4,1.2);
}
.battle-scene.battle-review .battle-enemy.hit {
  animation: enemyHitR 0.85s ease-out;
}
.battle-scene.battle-review .battle-hero.feint {
  animation: heroFeintR 0.55s ease-out;
}
.battle-scene.battle-review .battle-enemy.approach {
  animation: enemyApproachR 0.7s ease-in-out;
}
.battle-scene.battle-review .slash-fx {
  left: auto;
  right: 12%;
  transform-origin: right center;
  background: linear-gradient(90deg, transparent 0%, #fff 40%, #ffe14c 60%, transparent 100%);
  animation: slashGoR 0.5s ease-out forwards;
}
.battle-scene.battle-review .damage-text {
  left: auto;
  right: 14%;
}
@keyframes heroLungeR {
  0%   { transform: translate(0, 0) scale(1) rotate(0); filter: none; }
  15%  { transform: translate(-20px, -4px) scale(1.02) rotate(-3deg); }
  40%  { transform: translate(75px, -18px) scale(1.18) rotate(4deg);
         filter: drop-shadow(0 0 12px #fff8) brightness(1.15); }
  55%  { transform: translate(75px, -18px) scale(1.18) rotate(4deg);
         filter: drop-shadow(0 0 12px #fff8) brightness(1.15); }
  100% { transform: translate(0, 0) scale(1) rotate(0); filter: none; }
}
@keyframes enemyHitR {
  0%   { transform: translate(0, 0) scale(1) rotate(0); filter: none; }
  10%  { transform: translate(30px, -12px) scale(0.85) rotate(18deg);
         filter: brightness(2.5) hue-rotate(-30deg); }
  25%  { transform: translate(-28px, 10px) scale(1.18) rotate(-14deg);
         filter: brightness(2.5) hue-rotate(-30deg); }
  40%  { transform: translate(22px, -6px) rotate(10deg);
         filter: brightness(1.8); }
  55%  { transform: translate(-16px, 4px) rotate(-7deg);
         filter: brightness(1.8); }
  70%  { transform: translate(8px, 0) rotate(3deg); filter: brightness(1.2); }
  85%  { transform: translate(-4px, 0) rotate(-1deg); }
  100% { transform: translate(0, 0) rotate(0); filter: none; }
}
@keyframes heroFeintR {
  0%, 100% { transform: translate(0, 0) rotate(0); }
  35%      { transform: translate(18px, -6px) rotate(-3deg); }
  65%      { transform: translate(18px, -6px) rotate(-3deg); }
}
@keyframes enemyApproachR {
  0%, 100% { transform: translate(0, 0) scale(1); }
  40%      { transform: translate(-22px, -8px) scale(1.1); }
  60%      { transform: translate(-22px, -8px) scale(1.1); }
}
@keyframes slashGoR {
  0%   { transform: translateY(-50%) rotate(-30deg) scaleX(0); opacity: 0; }
  20%  { transform: translateY(-50%) rotate(-30deg) scaleX(1); opacity: 1; }
  60%  { transform: translateY(-50%) rotate(-30deg) scaleX(1); opacity: 1; }
  100% { transform: translateY(-50%) rotate(-30deg) scaleX(1); opacity: 0; }
}

/* ねぎらいメッセージ */
.encouragement {
  font-size: 18px;
  line-height: 1.7;
  color: var(--dq-yellow);
  margin: 18px 8px 8px;
  white-space: pre-wrap;
  text-align: center;
  letter-spacing: 0.04em;
}

/* BGM パネル */
.bgm-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}
.bgm-row .bgm-label { font-size: 13px; color: var(--dq-dim); width: 50px; }
.bgm-row .bgm-value { font-size: 13px; color: var(--dq-yellow); width: 48px; text-align: right; font-feature-settings: "tnum"; }
.bgm-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 12px;
  background: #222;
  border: 2px solid #fff;
  border-radius: 6px;
  outline: none;
  margin: 0;
  padding: 0;
}
.bgm-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 26px;
  height: 26px;
  background: var(--dq-yellow);
  border: 2px solid #000;
  border-radius: 50%;
  cursor: pointer;
}
.bgm-row input[type="range"]::-moz-range-thumb {
  width: 26px;
  height: 26px;
  background: var(--dq-yellow);
  border: 2px solid #000;
  border-radius: 50%;
  cursor: pointer;
}
button.bgm-on  { color: var(--dq-green); border-color: var(--dq-green); }
button.bgm-off { color: var(--dq-dim);   border-color: var(--dq-dim); }

/* タイトル画面 */
#title-screen {
  min-height: calc(100vh - 24px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px 16px;
  text-align: center;
}
#title-screen .title-main {
  font-size: 34px;
  color: var(--dq-yellow);
  margin: 0 0 12px;
  letter-spacing: 0.15em;
  text-shadow: 0 0 14px #ffe14c66, 2px 2px 0 #000;
}
#title-screen .title-logo {

// このブラウザで localStorage が使えるか
const STORAGE_OK = (() => {
  try {
    const k = '__study_rpg_test__';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    return true;
  } catch (e) {
    return false;
  }
})();

let state = loadState();

function loadState() {
  if (!STORAGE_OK) return defaultState();
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    // 軽いマイグレーション
    const def = defaultState();
    return mergeDefault(def, parsed);
  } catch (e) {
    console.error('セーブデータの読み込みに失敗', e);
    return defaultState();
  }
}

function mergeDefault(def, src) {
  if (def === null || typeof def !== 'object') return src ?? def;
  if (src === null || typeof src !== 'object') return def;
  const out = Array.isArray(def) ? [] : {};
  for (const k of Object.keys(def)) {
    out[k] = mergeDefault(def[k], src[k]);
  }
  // 既存の追加キーも保持
  for (const k of Object.keys(src)) {
    if (!(k in out)) out[k] = src[k];
  }
  return out;
}

let saveWarned = false;
function saveState() {
  if (!STORAGE_OK) return;
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.error('セーブ失敗', e);
    if (!saveWarned) {
      saveWarned = true;
      showToast('セーブに失敗しました\n（このブラウザでは保存できないよ）');
    }
  }
}

function expRate(subj) {
  return subj === 'review' ? 2 : 1;
}
function levelOf(subj) {
  return 1 + Math.floor(state.subjects[subj].totalMin * expRate(subj) / 100);
}
function expInLevel(subj) {
  return (state.subjects[subj].totalMin * expRate(subj)) % 100;
}
function totalLevel() {
  return SUBJECTS.reduce((s, k) => s + levelOf(k), 0);
}
function totalMinutes() {
  return SUBJECTS.reduce((s, k) => s + state.subjects[k].totalMin, 0);
}
function currentWeapon(subj) {
  const lv = levelOf(subj);
  let w = WEAPONS[subj][0];
  for (const x of WEAPONS[subj]) if (lv >= x.lv) w = x;
  return w;
}
function nextBoss(subj) {
  const sub = state.subjects[subj];
  for (const b of BOSSES[subj]) {
    if (!sub.defeated.includes(b.id)) return b;
  }
  return null;
}

function awardMinutes(subj, mins) {
  const before = levelOf(subj);
  state.subjects[subj].totalMin += mins;
  // やり直しは ゴールドも 2倍
  const goldMult = (subj === 'review') ? 2 : 1;
  state.gold += mins * goldMult;

  // 日次記録
  const today = todayKey();
  if (!state.daily[today]) state.daily[today] = { math:0, japanese:0, science:0, social:0, review:0 };
  if (state.daily[today][subj] === undefined) state.daily[today][subj] = 0;
  state.daily[today][subj] += mins;

  // 戦闘演出 (現在表示中の教科のみ)
  if (T.subject === subj) {
    triggerAttack(mins);
  }

  // レベルアップ
  const after = levelOf(subj);
  if (after > before) {
    const gainedLevels = after - before;
    const bonus = gainedLevels * 50 * goldMult;
    state.gold += bonus;
    const w = currentWeapon(subj);
    showToast(`${SUBJECT_INFO[subj].name}の レベルが ${after} に あがった！\n${bonus}G ボーナス！\n武器: ${w.name}`);
  }

  // 週・月のしきい値チェック
  checkThresholds();
  // やり直しの日次しきい値チェック
  if (subj === 'review') checkDailyReviewThresholds();
}

const WEEKLY_REVIEW_TIERS = [

  { tier: 2, mins: 200, gold: 400, emoji: '🥈', label: 'シルバー' },

];

function pad2(n) { return String(n).padStart(2, '0'); }
function dateKeyOf(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function todayKey() { return dateKeyOf(new Date()); }
function monthKey(d = new Date()) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
// その週の月曜日(ローカル)を 'YYYY-MM-DD' で返す
function weekKey(d = new Date()) {
  const x = new Date(d);
  x.setHours(0,0,0,0);
  const dow = x.getDay(); // 0=日, 1=月, ... 6=土
  const diffToMonday = dow === 0 ? -6 : 1 - dow;
  x.setDate(x.getDate() + diffToMonday);
  return dateKeyOf(x);
}

function dayTotalSubj(dateKey) {
  const day = state.daily[dateKey];
  if (!day) return { math:0, japanese:0, science:0, social:0, review:0, total:0 };
  const review = day.review || 0;
  return { ...day, review, total: day.math + day.japanese + day.science + day.social + review };
}

function weekStatsBySubject(weekStart = weekKey()) {
  const start = new Date(weekStart + 'T00:00:00');
  const out = { math:0, japanese:0, science:0, social:0, review:0, total:0 };
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    const ds = dayTotalSubj(dateKeyOf(d));
    out.math += ds.math; out.japanese += ds.japanese;
    out.science += ds.science; out.social += ds.social;
    out.review += ds.review;
    out.total += ds.total;
  }
  return out;
}

function monthTotalMin(mk = monthKey()) {
  let total = 0;
  for (const [date, day] of Object.entries(state.daily)) {
    if (date.startsWith(mk + '-')) {
      total += (day.math + day.japanese + day.science + day.social + (day.review || 0));
    }
  }
  return total;
}

function monthStatsBySubject(mk = monthKey()) {
  const out = { math:0, japanese:0, science:0, social:0, review:0, total:0 };
  for (const [date, day] of Object.entries(state.daily)) {
    if (date.startsWith(mk + '-')) {
      const review = day.review || 0;
      out.math += day.math; out.japanese += day.japanese;
      out.science += day.science; out.social += day.social;
      out.review += review;
      out.total += (day.math + day.japanese + day.science + day.social + review);
    }
  }
  return out;
}

function hasTrophy(type, tier, period) {
  return state.trophies.some(t => t.type === type && t.tier === tier && t.period === period);
}
function awardTrophy(type, tierObj, period, periodLabel) {
  state.trophies.push({
    type, tier: tierObj.tier, period,
    gold: tierObj.gold, date: Date.now(),
  });
  state.gold += tierObj.gold;
  const kindLabel =
    type === 'weekly'        ? '週' :
    type === 'monthly'       ? '月' :
    type === 'daily-review'  ? '今日のやり直し' :
    type === 'weekly-review' ? '週のやり直し' : '';
  showToast(
    `✨サプライズ！✨\n${periodLabel}\n${tierObj.emoji} ${kindLabel}王 (${tierObj.label})\n+${tierObj.gold}G`,
    { trophy: true }
  );
}

function checkThresholds() {
  // 今週(全体)
  const wk = weekKey();
  const weekly = weekStatsBySubject(wk).total;
  const wkLabel = `${wk.replace(/-/g,'/')} 〜 の週`;
  for (const tier of WEEKLY_TIERS) {
    if (weekly >= tier.mins && !hasTrophy('weekly', tier.tier, wk)) {
      awardTrophy('weekly', tier, wk, wkLabel);
    }
  }
  // 今週(やり直し)
  const weeklyReview = weekStatsBySubject(wk).review;
  for (const tier of WEEKLY_REVIEW_TIERS) {
    if (weeklyReview >= tier.mins && !hasTrophy('weekly-review', tier.tier, wk)) {
      awardTrophy('weekly-review', tier, wk, `${wkLabel} やり直し`);
    }
  }
  // 今月
  const mk = monthKey();
  const monthly = monthTotalMin(mk);
  const mkLabel = `${mk.slice(0,4)}年${parseInt(mk.slice(5),10)}月`;
  for (const tier of MONTHLY_TIERS) {
    if (monthly >= tier.mins && !hasTrophy('monthly', tier.tier, mk)) {
      awardTrophy('monthly', tier, mk, mkLabel);
    }
  }
}

function checkDailyReviewThresholds() {
  const today = todayKey();
  const reviewMin = state.daily[today]?.review || 0;
  const dateLabel = `${today.replace(/-/g,'/')}のやり直し`;
  for (const tier of DAILY_REVIEW_TIERS) {
    if (reviewMin >= tier.mins && !hasTrophy('daily-review', tier.tier, today)) {
      awardTrophy('daily-review', tier, today, dateLabel);
    }
  }
}

function computeMonthlyTotals(monthsBack = 12) {
  // 新しい順 (今月→11か月前)
  const result = [];
  const now = new Date();
  for (let i = 0; i < monthsBack; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = monthKey(d);
    const total = monthTotalMin(key);
    result.push({
      key,
      total,
      label: `${d.getFullYear().toString().slice(2)}/${pad2(d.getMonth()+1)}`,
    });
  }
  return result;
}

function nextWeeklyTier(curMin) {
  for (const t of WEEKLY_TIERS) if (curMin < t.mins) return t;
  return null;
}
function nextMonthlyTier(curMin) {
  for (const t of MONTHLY_TIERS) if (curMin < t.mins) return t;
  return null;
}

  return Math.floor(diff / 86400000);
}

const T = {
  running: false,
  paused:  false,
  subject: null,
  segStartedAt: null,    // 現在の running 区間の開始時刻
  bankedMs: 0,           // 経験値変換していない端数ms（セッション内）
  sessionMs: 0,          // セッション開始からの累積勉強時間ms (端数も含む)
  intervalId: null,
  lastTickAt: 0,
};

function tStart(subj) {
  if (T.running || T.paused) return;
  // 過去セッションの端数を取り込み
  const carrySec = state.subjects[subj].bankedSec || 0;
  state.subjects[subj].bankedSec = 0;
  saveState();

  T.subject = subj;
  T.bankedMs = carrySec * 1000;
  T.sessionMs = carrySec * 1000; // 表示は「今回の勉強時間」: 端数も含めるとうれしい
  T.segStartedAt = Date.now();
  T.lastTickAt = Date.now();
  T.lastConfirmAt = Date.now();
  T.running = true;
  T.paused = false;
  T.intervalId = setInterval(tTick, 500);
  render();
  startBattleLoop();
  playBgm(subj);
}

function tPause() {
  if (!T.running) return;
  tCommit();
  T.running = false;
  T.paused = true;
  if (T.intervalId) clearInterval(T.intervalId);
  T.intervalId = null;
  pauseBgm();
  clearStudyConfirm();
  render();
}

function tResume() {
  if (!T.paused) return;
  T.segStartedAt = Date.now();
  T.lastTickAt = Date.now();
  T.lastConfirmAt = Date.now();
  T.running = true;
  T.paused = false;
  T.intervalId = setInterval(tTick, 500);
  resumeBgm();
  render();
}

function tStop() {
  if (T.running) tCommit();
  // 端数を次回に持ち越し
  if (T.subject) {
    state.subjects[T.subject].bankedSec = Math.floor(T.bankedMs / 1000);
  }
  // セッション履歴
  if (T.sessionMs > 0) {
    state.history.lastStudyAt = Date.now();
    state.history.lastSessionSec = Math.floor(T.sessionMs / 1000);
  }
  saveState();
  if (T.intervalId) clearInterval(T.intervalId);
  T.running = false; T.paused = false; T.subject = null;
  T.segStartedAt = null; T.bankedMs = 0; T.sessionMs = 0;
  T.intervalId = null; T.lastTickAt = 0; T.lastConfirmAt = null;
  stopBattleLoop();
  stopBgm();
  clearStudyConfirm();
  render();
}

// 現在 running 区間の経過分を経験値に反映 + sessionMs を更新
function tCommit() {
  if (!T.running || !T.subject) return;
  const now = Date.now();
  const segMs = Math.max(0, now - T.segStartedAt);
  // sessionMs 更新（端数も含めた累積）
  T.sessionMs += segMs;
  // 経験値換算
  T.bankedMs += segMs;
  const minutes = Math.floor(T.bankedMs / 60000);
  if (minutes > 0) {
    awardMinutes(T.subject, minutes);
    T.bankedMs -= minutes * 60000;
  }
  T.segStartedAt = now;
  saveState();
}

function tTick() {
  if (!T.running) return;
  T.lastTickAt = Date.now();
  tCommit();
  render(false);
  // ストップ押し忘れ確認 (40分ごと)
  maybeShowStudyConfirm();
}

const CONFIRM_INTERVAL_MS = 40 * 60 * 1000; // 40分ごとに確認

let autoStopTimer = null;

function maybeShowStudyConfirm() {
  if (confirmShown) return;

function fmtTime(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}時間${String(m).padStart(2,'0')}分${String(s).padStart(2,'0')}秒`;
  return `${String(m).padStart(2,'0')}分${String(s).padStart(2,'0')}秒`;
}
function fmtDuration(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  if (h > 0) return `${h}時間 ${m}分`;
  return `${m}分`;
}
function fmtDate(ts) {
  if (!ts) return '- - -';
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function triggerAttack(damage) {
  const scene = document.getElementById('battle-scene');
  if (!scene) return;
  const hero = scene.querySelector('.battle-hero');
  const enemy = scene.querySelector('.battle-enemy');

  // 牽制中のクラスがあれば外す（攻撃モーションが優先）
  hero?.classList.remove('feint');
  enemy?.classList.remove('approach');

  // 構え→踏み込み開始
  if (hero) {
    hero.classList.remove('attacking');
    void hero.offsetWidth;
    hero.classList.add('attacking');
  }

  // 剣の閃光と敵のけぞりは、踏み込みが当たるタイミング (0.4s 付近) に少し遅らせる
  setTimeout(() => {
    // 剣の閃光
    const slash = document.createElement('div');
    slash.className = 'slash-fx';
    scene.appendChild(slash);
    setTimeout(() => slash.remove(), 550);

    // スパーク (4個飛び散る)
    for (let i = 0; i < 4; i++) {
      const s = document.createElement('div');
      s.className = 'spark-fx';
      s.textContent = ['✦', '✶', '✸', '★'][i];
      const enemyRect = enemy?.getBoundingClientRect();
      const sceneRect = scene.getBoundingClientRect();
      if (enemyRect && sceneRect) {
        s.style.left = (enemyRect.left - sceneRect.left + enemyRect.width/2 + (Math.random()*60-30)) + 'px';
        s.style.top  = (enemyRect.top  - sceneRect.top  + enemyRect.height/2 + (Math.random()*40-20)) + 'px';
      }
      const dx = (Math.random() - 0.5) * 80;
      const dy = -30 - Math.random() * 30;
      s.style.setProperty('--dx', dx + 'px');
      s.style.setProperty('--dy', dy + 'px');
      s.style.animationDelay = (i * 30) + 'ms';
      scene.appendChild(s);
      setTimeout(() => s.remove(), 700);
    }

    // 敵のけぞり
    if (enemy) {
      enemy.classList.remove('hit');
      void enemy.offsetWidth;
      enemy.classList.add('hit');
    }

    // ダメージ数字
    const dmg = document.createElement('div');
    dmg.className = 'damage-text';
    dmg.textContent = '−' + (damage || 1);
    scene.appendChild(dmg);
    setTimeout(() => dmg.remove(), 1200);
  }, 320);

  // モーションクラス除去
  setTimeout(() => {
    hero?.classList.remove('attacking');
    enemy?.classList.remove('hit');
  }, 1000);
}

const bgmAudio = {};
const bgmFailed = {};
let titleAudio = null;
let titleAudioFailed = false;

function getTitleBgm() {
  if (titleAudioFailed) return null;
  if (titleAudio) return titleAudio;
  const a = new Audio('audio/bgm-title.mp3');
  a.loop = true;
  a.preload = 'auto';
  a.volume = (state.bgm?.volume ?? 50) / 100;
  a.addEventListener('error', () => {
    titleAudioFailed = true;
    titleAudio = null;
  });
  titleAudio = a;
  return a;
}

function playTitleBgm() {
  if (!state.bgm?.enabled) return;
  const a = getTitleBgm();
  if (!a) return;
  a.volume = (state.bgm.volume ?? 50) / 100;
  a.play().catch(() => {/* 自動再生ブロック等は無視 */});
}

function stopTitleBgm() {
  if (titleAudio && !titleAudio.paused) {
    titleAudio.pause();
    titleAudio.currentTime = 0;
  }
}

function getBgm(subj) {
  if (bgmFailed[subj]) return null;
  if (bgmAudio[subj]) return bgmAudio[subj];
  const a = new Audio(`audio/bgm-${subj}.mp3`);
  a.loop = true;
  a.preload = 'auto';
  a.volume = (state.bgm?.volume ?? 50) / 100;
  a.addEventListener('error', () => {
    bgmFailed[subj] = true;
    bgmAudio[subj] = null;
  });
  bgmAudio[subj] = a;
  return a;
}

function playBgm(subj) {
  if (!state.bgm?.enabled) return;
  if (state.bgm?.subjects?.[subj] === false) return;
  // 他教科の BGM があれば停止
  for (const k of SUBJECTS) {
    if (k !== subj && bgmAudio[k] && !bgmAudio[k].paused) {
      bgmAudio[k].pause();
      bgmAudio[k].currentTime = 0;
    }
  }
  const a = getBgm(subj);
  if (!a) return;
  a.volume = (state.bgm.volume ?? 50) / 100;
  a.play().catch(() => {/* ファイルなし等は無視 */});
}

function toggleSubjectBgm(subj) {
  if (!state.bgm.subjects) state.bgm.subjects = { math:true, japanese:true, science:true, social:true };
  state.bgm.subjects[subj] = !state.bgm.subjects[subj];
  // 今その教科を勉強中なら、即時反映
  if (T.subject === subj) {
    if (state.bgm.subjects[subj] && state.bgm.enabled && T.running) {
      playBgm(subj);
    } else {
      // この教科だけ止める
      if (bgmAudio[subj] && !bgmAudio[subj].paused) {
        bgmAudio[subj].pause();
        bgmAudio[subj].currentTime = 0;
      }
    }
  }
  saveState();
  renderSubjects();
}

function pauseBgm() {
  for (const k of SUBJECTS) {
    if (bgmAudio[k] && !bgmAudio[k].paused) {
      bgmAudio[k].pause();
    }
  }
}

function resumeBgm() {
  if (!state.bgm?.enabled || !T.subject) return;
  const a = getBgm(T.subject);
  if (!a) return;
  a.play().catch(() => {});
}

function stopBgm() {
  for (const k of SUBJECTS) {
    if (bgmAudio[k]) {
      bgmAudio[k].pause();
      bgmAudio[k].currentTime = 0;
    }
  }
}

function setBgmVolume(v) {
  state.bgm.volume = v;
  for (const k of SUBJECTS) {
    if (bgmAudio[k]) bgmAudio[k].volume = v / 100;
  }
  if (titleAudio) titleAudio.volume = v / 100;
  saveState();
  refreshBgmUI();
}

function setBgmEnabled(enabled) {
  state.bgm.enabled = enabled;
  if (!enabled) {
    stopBgm();
    stopTitleBgm();
  } else {
    if (T.subject && T.running) playBgm(T.subject);
    if (!document.getElementById('title-screen').classList.contains('hidden')) {
      playTitleBgm();
    }
  }
  saveState();
  refreshBgmUI();
}

function refreshBgmUI() {
  const btn = document.getElementById('btn-bgm-toggle');
  const titleBtn = document.getElementById('title-bgm-toggle');
  const slider = document.getElementById('bgm-volume');
  const label = document.getElementById('bgm-volume-label');
  for (const b of [btn, titleBtn]) {
    if (!b) continue;
    b.textContent = state.bgm.enabled ? '🎵 BGM ON' : '🔇 BGM OFF';
    b.classList.toggle('bgm-on',  state.bgm.enabled);
    b.classList.toggle('bgm-off', !state.bgm.enabled);
  }
  if (slider) slider.value = state.bgm.volume;
  if (label) label.textContent = state.bgm.volume + '%';
}

// アイドル中の牽制ループ (running 中のみ動く)
let battleLoopId = null;
function startBattleLoop() {
  if (battleLoopId) return;
  battleLoopId = setInterval(() => {
    if (!T.running) return;
    const scene = document.getElementById('battle-scene');
    if (!scene) return;
    const hero = scene.querySelector('.battle-hero');
    const enemy = scene.querySelector('.battle-enemy');
    // 攻撃中・ヒット中はスキップ
    if (hero?.classList.contains('attacking') || enemy?.classList.contains('hit')) return;
    const r = Math.random();
    if (r < 0.4) {
      // 勇者の牽制
      hero?.classList.remove('feint'); void hero?.offsetWidth;
      hero?.classList.add('feint');
      setTimeout(() => hero?.classList.remove('feint'), 600);
    } else if (r < 0.75) {
      // 敵の接近
      enemy?.classList.remove('approach'); void enemy?.offsetWidth;
      enemy?.classList.add('approach');
      setTimeout(() => enemy?.classList.remove('approach'), 750);
    }
    // それ以外は何もしない（アイドル揺れだけ）
  }, 1500);
}
function stopBattleLoop() {
  if (battleLoopId) clearInterval(battleLoopId);
  battleLoopId = null;
}

function refreshSubjectBars() {
  for (const subj of SUBJECTS) {
    const el = document.getElementById('sub-' + subj);
    if (!el) continue;
    const exp = expInLevel(subj);
    const lv  = levelOf(subj);
    el.querySelector('.subject-level').textContent = `Lv ${lv}`;
    el.querySelector('.expbar .fill').style.width = exp + '%';
    el.querySelector('.expbar .text').textContent = `${exp} / 100`;
    el.querySelector('.weapon').textContent = `武器: ${currentWeapon(subj).name}`;
  }
}

function renderBosses() {
  const root = document.getElementById('boss-list');
  const items = [];
  for (const subj of SUBJECTS) {
    for (const b of BOSSES[subj]) {
      const defeated = state.subjects[subj].defeated.includes(b.id);
      const lv = levelOf(subj);
      const unlocked = lv >= b.lv;
      let cls = '';
      if (defeated) cls = 'boss-defeated';
      let action = '';
      if (defeated) {
        action = `<span class="small">たおした！</span>`;
      } else if (unlocked) {
        action = `<button class="btn-red" data-boss="${subj}:${b.id}">いどむ</button>`;
      } else {
        action = `<span class="small">Lv${b.lv}で あらわれる</span>`;
      }
      items.push(`
        <div class="boss-item">
          <div>
            <div class="boss-name ${cls}">${SUBJECT_INFO[subj].emoji} ${b.name}</div>
            <div class="boss-info">${SUBJECT_INFO[subj].name} HP${b.hp}　報しゅう ${b.gold}G</div>
          </div>
          ${action}
        </div>
      `);
    }
  }
  root.innerHTML = items.join('');
  root.querySelectorAll('button[data-boss]').forEach(btn => {
    btn.addEventListener('click', () => {
      const [subj, id] = btn.dataset.boss.split(':');
      const boss = BOSSES[subj].find(b => b.id === id);
      if (boss) startBattle(subj, boss);
    });
  });
}

function renderMenu() {
  document.getElementById('last-session').textContent =
    state.history.lastSessionSec > 0
      ? fmtDuration(state.history.lastSessionSec)
      : '- - -';
  document.getElementById('last-date').textContent = fmtDate(state.history.lastStudyAt);
}

// ============================================================
// バトル
// ============================================================

const battle = {
  active: false,
  subject: null,
  boss: null,
  bossHp: 0,
  playerHp: 3,
  pool: [],
  log: '',
};

function startBattle(subj, boss) {
  if (T.running || T.paused) {
    showToast('まずは 勉強の タイマーを ストップしてね');
    return;
  }
  battle.active = true;
  battle.subject = subj;
  battle.boss = boss;
  battle.bossHp = boss.hp;
  battle.playerHp = 3;
  // やり直しのボスは4教科ミックス
  const sourceQuestions = subj === 'review'
    ? ['math','japanese','science','social'].flatMap(k => QUIZZES[k])
    : QUIZZES[subj];
  battle.pool = shuffle([...sourceQuestions]);
  battle.log = `${boss.name}が あらわれた！\n${SUBJECT_INFO[subj].name}の もんだいに こたえろ！`;
  renderBattle();
}

function endBattle(victory) {
  battle.active = false;
  if (victory) {
    state.subjects[battle.subject].defeated.push(battle.boss.id);
    state.gold += battle.boss.gold;
    saveState();
  }
  closeModal();
  if (victory) {
    showToast(`${battle.boss.name}を たおした！\n${battle.boss.gold}G を てに いれた！`);
  } else {
    showToast('やられてしまった…\nもういちど ちょうせんできるよ');
  }
  render();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextQuestion() {
  if (battle.pool.length === 0) {
    const src = battle.subject === 'review'
      ? ['math','japanese','science','social'].flatMap(k => QUIZZES[k])
      : QUIZZES[battle.subject];
    battle.pool = shuffle([...src]);
  }
  return battle.pool.shift();
}

function renderBattle() {
  const root = document.getElementById('modal-root');
  if (!battle.active) { root.innerHTML = ''; return; }

  const q = battle.currentQ || (battle.currentQ = nextQuestion());
  const heartsBoss = renderHearts(battle.bossHp, battle.boss.hp);
  const heartsP    = renderHearts(battle.playerHp, 3);

  root.innerHTML = `
    <div class="modal-bg" id="battle-bg">
      <div class="modal" id="battle-modal">
        <div class="panel-title center">▼ ボスせん</div>
        <div class="battle-stats">
          <div class="who">
            <div class="name">${battle.boss.name}</div>
            <div class="hp">${heartsBoss}</div>
          </div>
          <div class="who">
            <div class="name">${state.hero.name || 'ゆうしゃ'}</div>
            <div class="hp">${heartsP}</div>
          </div>
        </div>
        <div class="battle-message" id="battle-msg">${battle.log}</div>
        <div class="quiz-question">Q. ${q.q}</div>
        <div class="quiz-choices" id="choices">
          ${q.choices.map((c, i) => `<button data-i="${i}">${i+1}. ${c}</button>`).join('')}
        </div>
        <div class="row mt12">
          <button class="btn-yellow" id="battle-flee">にげる</button>
        </div>
      </div>
    </div>
  `;
  document.querySelectorAll('#choices button').forEach(btn => {
    btn.addEventListener('click', () => answerChoice(parseInt(btn.dataset.i, 10)));
  });
  document.getElementById('battle-flee').addEventListener('click', () => {
    showConfirm('にげますか？', '今のボス戦は キャンセルされるよ', () => {
      battle.active = false;
      battle.currentQ = null;
      closeModal();
      render();
    });
  });
}

function renderHearts(cur, max) {
  let s = '';
  for (let i = 0; i < max; i++) {
    s += i < cur ? '<span class="hp-heart">♥</span>' : '<span class="hp-empty">♡</span>';
  }
  return s;
}

function answerChoice(idx) {
  const q = battle.currentQ;
  const correct = idx === q.a;
  const modalEl = document.getElementById('battle-modal');
  const msgEl   = document.getElementById('battle-msg');

  if (correct) {
    battle.bossHp -= 1;
    battle.log = `せいかい！\n${battle.boss.name}に こうげき！`;
    msgEl.classList.add('flash-correct');
  } else {
    battle.playerHp -= 1;
    const exp = q.e ? `\n（${q.e}）` : '';
    battle.log = `ざんねん…\n正解は 「${q.choices[q.a]}」${exp}`;
    msgEl.classList.add('flash-wrong');
  }
  setTimeout(() => msgEl?.classList?.remove('flash-correct','flash-wrong'), 500);

  battle.currentQ = null;

  // 勝敗判定
  if (battle.bossHp <= 0) {
    setTimeout(() => endBattle(true), 700);
    // 残り表示はここでは差し替えるが、battle.activeはまだtrue
    rerenderBattleStatsOnly(/*finalMessage:*/ `${battle.boss.name}を たおした！`);
    return;
  }
  if (battle.playerHp <= 0) {
    setTimeout(() => endBattle(false), 700);
    rerenderBattleStatsOnly(`やられてしまった…`);
    return;
  }
  // 次の問題へ
  setTimeout(() => renderBattle(), 600);
}

function rerenderBattleStatsOnly(finalMsg) {
  const heartsBoss = renderHearts(battle.bossHp, battle.boss.hp);
  const heartsP    = renderHearts(battle.playerHp, 3);
  document.querySelectorAll('.battle-stats .who')[0].innerHTML =
    `<div class="name">${battle.boss.name}</div><div class="hp">${heartsBoss}</div>`;
  document.querySelectorAll('.battle-stats .who')[1].innerHTML =
    `<div class="name">${state.hero.name||'ゆうしゃ'}</div><div class="hp">${heartsP}</div>`;
  const msgEl = document.getElementById('battle-msg');
  if (msgEl) msgEl.textContent = finalMsg;
}

// ============================================================
// モーダル / トースト
// ============================================================

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

function showConfirm(title, body, onYes) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal">
        <div class="panel-title">${title}</div>
        <div>${body}</div>
        <div class="confirm-btns">
          <button class="btn-red" id="cf-yes">はい</button>
          <button id="cf-no">いいえ</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('cf-yes').onclick = () => { closeModal(); onYes(); };
  document.getElementById('cf-no').onclick  = () => closeModal();
}

function showPrompt(title, defaultVal, onOk) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal">
        <div class="panel-title">${title}</div>
        <input id="pp-input" type="text" value="${escapeHtml(defaultVal||'')}" maxlength="12"
               style="width:100%;padding:10px;font-size:18px;border:2px solid #fff;border-radius:6px;background:#000;color:#fff;">
        <div class="confirm-btns">
          <button class="btn-yellow" id="pp-ok">けってい</button>
          <button id="pp-cancel">キャンセル</button>
        </div>
      </div>
    </div>
  `;
  const input = document.getElementById('pp-input');
  setTimeout(() => input.focus(), 50);
  document.getElementById('pp-ok').onclick = () => {
    const v = input.value.trim();
    closeModal();
    onOk(v || defaultVal || '');
  };
  document.getElementById('pp-cancel').onclick = () => closeModal();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function showToast(msg, opts = {}) {
  const root = document.getElementById('toast-root');
  const el = document.createElement('div');
  el.className = 'toast' + (opts.trophy ? ' toast-trophy' : '');
  el.textContent = msg;
  root.appendChild(el);
  setTimeout(() => el.remove(), opts.trophy ? 4500 : 2800);
}

function showCollection() {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-bg">
      <div class="modal" style="max-width:600px;">
        <div class="panel-title center">▼ アイテム ずかん</div>

        <div class="collection-section">
          <div class="section-title">⚔ ぶき コレクション</div>
          ${SUBJECTS.map(renderWeaponList).join('')}
        </div>

        <div class="collection-section">
          <div class="section-title">🏆 トロフィー（たおしたボス）</div>
          ${SUBJECTS.map(renderTrophyList).join('')}
        </div>

        ${renderEarnedSurpriseTrophies()}

        <div class="confirm-btns">
          <button id="col-close">とじる</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('col-close').onclick = closeModal;
}

function renderWeaponList(subj) {
  const lv = levelOf(subj);
  const cur = currentWeapon(subj);
  const info = SUBJECT_INFO[subj];
  const items = WEAPONS[subj].map(w => {
    const got = lv >= w.lv;
    const isCur = got && w.name === cur.name;
    let cls = '';
    if (!got) cls = 'item-locked';
    else if (isCur) cls = 'item-current';
    return `
      <div class="item-row ${cls}">
        <span class="item-icon">${got ? '⚔' : '🔒'}</span>
        <span class="item-name">${got ? escapeHtml(w.name) : '？？？'}</span>
        <span class="item-info">${got ? `Lv${w.lv}〜` : `Lv${w.lv}で てにいれる`}</span>
      </div>
    `;
  }).join('');
  return `
    <div class="subj-block">
      <div class="subj-block-title">${info.emoji} ${info.name}</div>
      ${items}
    </div>
  `;
}

function renderEarnedSurpriseTrophies() {
  if (!state.trophies || state.trophies.length === 0) {
    return `
      <div class="collection-section">
        <div class="section-title">🏅 サプライズ トロフィー</div>
        <div class="small">まだ ない。週300分・月1500分で もらえるよ！</div>
      </div>
    `;
  }
  // 新しい順
  const sorted = [...state.trophies].sort((a, b) => b.date - a.date);
  const items = sorted.map(t => {
    const tierObj = (t.type === 'weekly' ? WEEKLY_TIERS : MONTHLY_TIERS).find(x => x.tier === t.tier);
    const periodLabel = t.type === 'weekly'
      ? `${t.period.replace(/-/g,'/')}〜の週`
      : `${t.period.slice(0,4)}年${parseInt(t.period.slice(5),10)}月`;
    const kindLabel = t.type === 'weekly' ? '週' : '月';
    return `
      <div class="item-row">
        <span class="item-icon">${tierObj.emoji}</span>
        <span class="item-name">${kindLabel}のトロフィー (${tierObj.label})</span>
        <span class="item-info">${periodLabel}　+${t.gold}G</span>
      </div>
    `;
  }).join('');
  return `
    <div class="collection-section">
      <div class="section-title">🏅 サプライズ トロフィー (${state.trophies.length}こ)</div>
      ${items}
    </div>
  `;
}

function renderTrophyList(subj) {
  const info = SUBJECT_INFO[subj];
  const defeated = state.subjects[subj].defeated;
  const items = BOSSES[subj].map(b => {
    const got = defeated.includes(b.id);
    const cls = got ? '' : 'item-locked';
    return `
      <div class="item-row ${cls}">
        <span class="item-icon">${got ? '🏆' : '？'}</span>
        <span class="item-name">${got ? escapeHtml(b.name) : '？？？'}</span>
        <span class="item-info">${got ? `たおした！+${b.gold}G` : `Lv${b.lv}で 出現`}</span>
      </div>
    `;
  }).join('');
  return `
    <div class="subj-block">
      <div class="subj-block-title">${info.emoji} ${info.name}</div>
      ${items}
    </div>
  `;
}

document.getElementById('btn-rename').addEventListener('click', () => {
  showPrompt('なまえを いれてください', state.hero.name || 'ゆうしゃ', name => {
    state.hero.name = name.slice(0, 12);
    saveState();
    render();
  });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  showConfirm(
    'ぜんぶ リセットしますか？',
    'レベル・けいけんち・ゴールド・たおしたボスが すべて 消えます。\n本当に リセットしますか？',
    () => {
      state = defaultState();
      saveState();
      // タイマーも停止
      if (T.intervalId) clearInterval(T.intervalId);
      T.running = false; T.paused = false; T.subject = null;
      T.segStartedAt = null; T.bankedMs = 0; T.sessionMs = 0;
      T.intervalId = null;
      showToast('リセットしました');
      render();
    }
  );
});

// ページを閉じる前にセーブ (タイマーは止めない)
window.addEventListener('pagehide', () => {
  if (T.running) tCommit();
  if (T.subject) state.subjects[T.subject].bankedSec = Math.floor(T.bankedMs / 1000);
  saveState();
});

// 画面復帰時に表示を即更新 (経過時間は Date.now() ベースで正確に反映される)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && T.running) {
    tCommit();
    render(false);
  }
});
